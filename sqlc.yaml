---
version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "dao"
        out: "internal/db/dao"
        sql_package: "pgx/v5"
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_json_tags: true
        # Add this below to allow returning nil vals for JSON
        emit_pointers_for_null_types: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/gofrs/uuid/v3
              package: uuid
              type: UUID
            nullable: false
          - db_type: uuid
            go_type:
              import: github.com/gofrs/uuid/v3
              package: uuid
              type: NullUUID
            nullable: true
          - go_type: github.com/shopspring/decimal.Decimal
            db_type: pg_catalog.numeric
          - db_type: json
            go_type:
              import: encoding/json
              type: RawMessage
            nullable: false
          - db_type: jsonb
            go_type:
              import: encoding/json
              type: RawMessage
            nullable: false
          - db_type: json
            go_type:
              import: encoding/json
              type: RawMessage
            nullable: true
          - db_type: jsonb
            go_type:
              import: encoding/json
              type: RawMessage
            nullable: true
